{id:34,n:"Digitalizzazione magazzini: modelli previsionali",p:"2020",cl:"ITD",trl:"5-6",rk:"basso",yy:[2020],cs:{2020:0.30}},

{id:48,n:"Prototipo Pel di Carota: sprechi cucine",p:"2020–2021",cl:"ITE",trl:"4-6",rk:"basso",yy:[2020,2021],cs:{2020:0.50,2021:1.0}},
{id:49,n:"Recupero oli esausti – biocarburante flotta",p:"2022–2023",cl:"ITE",trl:"4-5",rk:"basso",yy:[2022,2023],cs:{2022:0.50,2023:0.35}},
{id:50,n:"Impronta carbonica organizzazione",p:"2022–2023",cl:"ITE",trl:"4-6",rk:"basso",yy:[2022,2023],cs:{2022:0.50,2023:0.35}},

const CC={"R&S":{2020:34020.88,2021:57753.97,2022:121185.76,2023:28767.04},"IT":{2020:75957.52,2021:38446.78,2022:4412.63,2023:23713.26},"ITD":{2020:57301.93,2021:14191.70,2022:58488.93,2023:10666.42},"ITE":{2020:5241.18,2021:3251.69,2022:1361.54,2023:880.03}};
const CLC={"R&S":"#1e6091","IT":"#2d8a4e","ITD":"#7c5cbf","ITE":"#c4782e"};
const RC={alto:"#dc2626",medio:"#d97706",basso:"#16a34a"};
const YRS=[2020,2021,2022,2023],CLS=["R&S","IT","ITD","ITE"];
const fmt=v=>v.toLocaleString("it-IT",{maximumFractionDigits:0});
const fE=v=>"€ "+fmt(Math.round(v));
const pct=(a,b)=>b===0?"–":(a/b*100).toFixed(1)+"%";

function BarSVG({data,w=400,h=180}){
  const mx=Math.max(...data.map(d=>(d.cert||0)+(d.excl||0)),1);
  const bw=Math.min(36,w/(data.length*2));
  const gap=(w-data.length*bw)/(data.length+1);
  return(<svg viewBox={"0 0 "+w+" "+(h+30)} style={{width:"100%",height:"auto"}}>{data.map((d,i)=>{
    const x=gap+(bw+gap)*i;const hC=(d.cert/mx)*(h-10);const hE=(d.excl/mx)*(h-10);
    return(<g key={i}><rect x={x} y={h-hC-hE} width={bw} height={hE} fill="#4a1d1d" rx="2"/><rect x={x} y={h-hC} width={bw} height={hC} fill={d.color||"#3b82f6"}/><text x={x+bw/2} y={h+14} textAnchor="middle" fill="#6b8299" fontSize="10">{d.name}</text>{d.cert>0&&<text x={x+bw/2} y={h-hC-4} textAnchor="middle" fill="#8899aa" fontSize="9">{fmt(Math.round(d.cert))}</text>}</g>);
  })}</svg>);
}
function HBarSVG({data,w=400,h=120}){
  const mx=Math.max(...data.map(d=>d.value),1);
  const bh=Math.min(28,h/(data.length*1.5));const gap=(h-data.length*bh)/(data.length+1);
  return(<svg viewBox={"0 0 "+w+" "+h} style={{width:"100%",height:"auto"}}>{data.map((d,i)=>{
    const y=gap+(bh+gap)*i;const bw=(d.value/mx)*(w-160);
    return(<g key={i}><text x="0" y={y+bh/2+4} fill="#8899aa" fontSize="11">{d.name}</text><rect x="140" y={y} width={bw} height={bh} fill={d.color} rx="3"/><text x={142+bw+4} y={y+bh/2+4} fill="#c8d6e5" fontSize="11" fontWeight="600">{fE(d.value)}</text></g>);
  })}</svg>);
}

function App(){
  const[cert,setCert]=useState(()=>{const m={};P.forEach(p=>{m[p.id]=p.rk!=="alto"});return m});
  const[tab,setTab]=useState("dashboard");
  const[fC,setFC]=useState("tutti");const[fY,setFY]=useState("tutti");const[fR,setFR]=useState("tutti");
  const[feeA,setFA]=useState(20000);const[feePct,setFP]=useState(5);const[feeMin,setFM]=useState(350);
  const[feeCp,setFCp]=useState(600);const[feeCr,setFCr]=useState(500);const[feeCo,setFCo]=useState(250);
  const tog=id=>setCert(p=>({...p,[id]:!p[id]}));
  const selAll=()=>{const n={};P.forEach(p=>{n[p.id]=true});setCert(n)};
  const selNone=()=>{const n={};P.forEach(p=>{n[p.id]=false});setCert(n)};
  const presCons=()=>{const n={};P.forEach(p=>{n[p.id]=p.rk!=="alto"&&!(p.rk==="medio"&&p.trl.includes("7"))});setCert(n)};
  const presOtt=()=>{const n={};P.forEach(p=>{n[p.id]=![29,32].includes(p.id)});setCert(n)};

  const st=useMemo(()=>{
    let tC=0,cC=0,cN=0;const bCl={},bY={},bCY={};
    CLS.forEach(c=>{bCl[c]={t:0,c:0}});YRS.forEach(y=>{bY[y]={t:0,c:0}});CLS.forEach(c=>YRS.forEach(y=>{bCY[c+"-"+y]={t:0,c:0}}));
    Object.keys(CC).forEach(c=>YRS.forEach(y=>{const v=CC[c][y]||0;tC+=v;bCl[c].t+=v;bY[y].t+=v;bCY[c+"-"+y].t=v}));
    P.forEach(p=>{const ok=cert[p.id];if(ok)cN++;p.yy.forEach(y=>{const v=(CC[p.cl]?.[y]||0)*(p.cs[y]||0);if(ok){cC+=v;bCl[p.cl].c+=v;bY[y].c+=v;bCY[p.cl+"-"+y].c+=v}})});
    const fBr=cC*feePct/100,fB=Math.max(fBr,cN*feeMin);
    const nPl=P.filter(p=>cert[p.id]&&p.yy.length>1).length,nHr=P.filter(p=>cert[p.id]&&p.rk!=="basso").length;
    const fCv=Math.min(nPl,4)*feeCp+Math.min(nHr,6)*feeCr;
    return{tC,cC,cN,bCl,bY,bCY,fB,fCv,fT:feeA+fB+fCv};
  },[cert,feeA,feePct,feeMin,feeCp,feeCr]);

  const filt=useMemo(()=>P.filter(p=>{
    if(fC!=="tutti"&&p.cl!==fC)return false;if(fY!=="tutti"&&!p.yy.includes(Number(fY)))return false;if(fR!=="tutti"&&p.rk!==fR)return false;return true}),[fC,fY,fR]);
  const cCl=CLS.map(c=>({name:c,cert:st.bCl[c].c,excl:st.bCl[c].t-st.bCl[c].c,color:CLC[c]}));
  const cYr=YRS.map(y=>({name:String(y),cert:st.bY[y].c,excl:st.bY[y].t-st.bY[y].c,color:"#3b82f6"}));
  const cFee=[{name:"A – Fisso",value:feeA,color:"#1e6091"},{name:"B – Variabile",value:Math.round(st.fB),color:"#2d8a4e"},{name:"C – Maggior.",value:Math.round(st.fCv),color:"#c4782e"}];
  const bx={background:"#0a1929",border:"1px solid #1e3a5f",borderRadius:"6px",padding:"16px"};
  const lb={fontSize:"11px",color:"#6b8299",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"8px"};
  const bn=bg=>({padding:"6px 14px",fontSize:"11px",fontWeight:"600",background:bg,color:"#e8ecf1",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"4px",cursor:"pointer"});
  const tb=a=>({padding:"10px 20px",fontSize:"13px",fontWeight:a?"700":"400",background:a?"#0f2942":"transparent",color:a?"#e8ecf1":"#8899aa",border:"none",borderBottom:a?"2px solid #3b82f6":"2px solid transparent",cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.5px"});
  const sl={padding:"6px 10px",fontSize:"12px",background:"#0a1929",border:"1px solid #1e3a5f",borderRadius:"4px",color:"#c8d6e5"};
  const bd=r=>({fontSize:"11px",fontWeight:"600",padding:"2px 8px",borderRadius:"3px",background:r==="alto"?"#7f1d1d":r==="medio"?"#78350f":"#14532d",color:r==="alto"?"#fca5a5":r==="medio"?"#fcd34d":"#86efac",textTransform:"uppercase",letterSpacing:"0.5px",display:"inline-block"});
  const Kpi=({l,v,sub,ac})=>(<div style={{...bx,flex:1,minWidth:"170px"}}><div style={lb}>{l}</div><div style={{fontSize:"24px",fontWeight:"700",color:ac||"#e8ecf1"}}>{v}</div>{sub&&<div style={{fontSize:"11px",color:"#4a6a8a",marginTop:"4px"}}>{sub}</div>}</div>);
  const Inp=({l,v,set,step=1})=>(<div style={{marginBottom:"12px"}}><label style={{fontSize:"11px",color:"#6b8299",display:"block",marginBottom:"4px"}}>{l}</label><input type="number" value={v} step={step} onChange={e=>set(Number(e.target.value))} style={{width:"100%",padding:"8px",background:"#060e18",border:"1px solid #1e3a5f",borderRadius:"4px",color:"#e8ecf1",fontSize:"14px"}}/></div>);

  return(<div>
    <div style={{background:"#0a1628",borderBottom:"1px solid #1a2d45",padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"12px"}}>
      <div><div style={{fontSize:"16px",fontWeight:"700",color:"#e8ecf1",letterSpacing:"1px"}}>SIMULATORE CERTIFICAZIONE R&S&I</div><div style={{fontSize:"11px",color:"#4a6a8a",marginTop:"2px"}}>CIR FOOD S.C. · 00464110352 · 2020–2023 · Art. 23 DL 73/2022</div></div>
      <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}><button onClick={selAll} style={bn("#1e3a5f")}>Tutti ✓</button><button onClick={selNone} style={bn("#1e3a5f")}>Nessuno ✗</button><button onClick={presCons} style={bn("#78350f")}>Conservativo</button><button onClick={presOtt} style={bn("#14532d")}>Ottimistico</button></div>
    </div>
    <div style={{display:"flex",borderBottom:"1px solid #1a2d45",background:"#0a1628",overflowX:"auto"}}>{[["dashboard","Dashboard"],["progetti","Progetti"],["compenso","Compenso"],["rischio","Rischio"]].map(([id,l])=><button key={id} onClick={()=>setTab(id)} style={tb(tab===id)}>{l}</button>)}</div>
    <div style={{padding:"20px 24px",maxWidth:"1400px",margin:"0 auto"}}>

{tab==="dashboard"&&<div>
  <div style={{display:"flex",gap:"12px",flexWrap:"wrap",marginBottom:"20px"}}><Kpi l="Progetti certificati" v={st.cN+" / 51"} sub={pct(st.cN,51)+" selezionati"}/><Kpi l="Credito certificato" v={fE(st.cC)} sub={"su "+fE(st.tC)+" ("+pct(st.cC,st.tC)+")"}/><Kpi l="Compenso stimato" v={fE(st.fT)} sub={"A "+fE(feeA)+" + B "+fE(st.fB)+" + C "+fE(st.fCv)} ac="#3b82f6"/><Kpi l="Esposizione evitata" v={fE(st.cC*2)} sub="credito + sanzione 100% inesistenza" ac="#f59e0b"/></div>
  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginBottom:"20px"}}><div style={bx}><div style={lb}>Credito per cluster</div><BarSVG data={cCl}/></div><div style={bx}><div style={lb}>Credito per anno</div><BarSVG data={cYr}/></div></div>
  <div style={bx}><div style={lb}>Dettaglio cluster × anno</div><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px"}}><thead><tr>{["Cluster",...YRS.map(String),"Totale"].map((h,i)=><th key={i} style={{padding:"8px 12px",textAlign:i===0?"left":"right",color:"#6b8299",borderBottom:"1px solid #1e3a5f",fontSize:"10px",textTransform:"uppercase"}}>{h}</th>)}</tr></thead><tbody>
    {CLS.map(c=>{const r=YRS.map(y=>st.bCY[c+"-"+y]?.c||0);return<tr key={c} style={{borderBottom:"1px solid #0f2040"}}><td style={{padding:"8px 12px",fontWeight:"600",color:CLC[c]}}>{c}</td>{r.map((v,i)=><td key={i} style={{padding:"8px 12px",textAlign:"right",color:v>0?"#c8d6e5":"#2a3f55"}}>{fE(v)}</td>)}<td style={{padding:"8px 12px",textAlign:"right",fontWeight:"700",color:"#e8ecf1"}}>{fE(r.reduce((a,b)=>a+b,0))}</td></tr>})}
    <tr style={{borderTop:"2px solid #1e3a5f"}}><td style={{padding:"8px 12px",fontWeight:"700",color:"#e8ecf1"}}>TOTALE</td>{YRS.map(y=><td key={y} style={{padding:"8px 12px",textAlign:"right",fontWeight:"700",color:"#e8ecf1"}}>{fE(st.bY[y].c)}</td>)}<td style={{padding:"8px 12px",textAlign:"right",fontWeight:"700",color:"#3b82f6",fontSize:"14px"}}>{fE(st.cC)}</td></tr>
  </tbody></table></div></div>
</div>}

{tab==="progetti"&&<div>
  <div style={{display:"flex",gap:"10px",marginBottom:"16px",flexWrap:"wrap",alignItems:"center"}}><span style={{fontSize:"11px",color:"#6b8299",textTransform:"uppercase"}}>Filtri:</span>
    <select value={fC} onChange={e=>setFC(e.target.value)} style={sl}><option value="tutti">Tutti i cluster</option>{CLS.map(c=><option key={c} value={c}>{c}</option>)}</select>
    <select value={fY} onChange={e=>setFY(e.target.value)} style={sl}><option value="tutti">Tutti gli anni</option>{YRS.map(y=><option key={y} value={y}>{y}</option>)}</select>
    <select value={fR} onChange={e=>setFR(e.target.value)} style={sl}><option value="tutti">Tutti i rischi</option><option value="alto">Alto</option><option value="medio">Medio</option><option value="basso">Basso</option></select>
    <span style={{fontSize:"11px",color:"#4a6a8a"}}>{filt.length} progetti</span></div>
  <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px"}}><thead><tr>{["","#","Progetto","Periodo","Cluster","TRL","Rischio","Credito","Stato"].map((h,i)=><th key={i} style={{padding:"8px 10px",textAlign:i<2?"center":"left",color:"#6b8299",borderBottom:"1px solid #1e3a5f",fontSize:"10px",textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead><tbody>
    {filt.map(p=>{const ok=cert[p.id];const pc=p.yy.reduce((s,y)=>s+(CC[p.cl]?.[y]||0)*(p.cs[y]||0),0);
      return<tr key={p.id} onClick={()=>tog(p.id)} style={{borderBottom:"1px solid #0f2040",cursor:"pointer",opacity:ok?1:0.45,background:ok?"transparent":"#0a0a12"}}>
        <td style={{padding:"6px 10px",textAlign:"center"}}><div style={{width:"18px",height:"18px",borderRadius:"3px",border:"2px solid "+(ok?"#3b82f6":"#2a3f55"),background:ok?"#3b82f6":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",color:"#fff"}}>{ok?"✓":""}</div></td>
        <td style={{padding:"6px 10px",textAlign:"center",color:"#4a6a8a",fontWeight:"600"}}>{p.id}</td>
        <td style={{padding:"6px 10px",maxWidth:"320px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:ok?"#c8d6e5":"#4a6a8a"}}>{p.n}</td>
        <td style={{padding:"6px 10px",whiteSpace:"nowrap",color:"#6b8299"}}>{p.p}</td>
        <td style={{padding:"6px 10px"}}><span style={{color:CLC[p.cl],fontWeight:"600"}}>{p.cl}</span></td>
        <td style={{padding:"6px 10px",color:"#6b8299"}}>{p.trl}</td>
        <td style={{padding:"6px 10px"}}><span style={bd(p.rk)}>{p.rk}</span></td>
        <td style={{padding:"6px 10px",textAlign:"right",color:ok?"#c8d6e5":"#4a6a8a"}}>{fE(pc)}</td>
        <td style={{padding:"6px 10px",textAlign:"center",fontSize:"11px",fontWeight:"600",color:ok?"#86efac":"#f87171"}}>{ok?"CERT":"ESCL"}</td></tr>})}
  </tbody></table></div>
</div>}

{tab==="compenso"&&<div>
  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"20px"}}>
    <div style={bx}><div style={{fontSize:"13px",fontWeight:"700",color:"#e8ecf1",marginBottom:"16px",textTransform:"uppercase"}}>Parametri</div>
      <Inp l="A – Onorario fisso (€)" v={feeA} set={setFA}/><Inp l="B – Percentuale credito (%)" v={feePct} set={setFP} step={0.5}/><Inp l="B – Minimo/certificato (€)" v={feeMin} set={setFM}/><Inp l="C – Pluriennale (€/prog)" v={feeCp} set={setFCp}/><Inp l="C – Parcellizzazione (€/prog)" v={feeCr} set={setFCr}/><Inp l="C – Tariffa oraria (€/h)" v={feeCo} set={setFCo}/></div>
    <div>
      <div style={{...bx,marginBottom:"16px"}}><div style={{fontSize:"13px",fontWeight:"700",color:"#e8ecf1",marginBottom:"16px",textTransform:"uppercase"}}>Risultato</div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:"13px"}}><tbody>
          {[["Progetti certificati",st.cN+" / 51",""],["Credito certificato",fE(st.cC),pct(st.cC,st.tC)],[null],["A – Onorario fisso",fE(feeA),pct(feeA,st.fT)],["B – Variabile ("+feePct+"%)",fE(st.fB),pct(st.fB,st.fT)],["C – Maggiorazioni",fE(st.fCv),pct(st.fCv,st.fT)]].map((r,i)=>r===null||r[0]===null?<tr key={i}><td colSpan={3} style={{padding:"4px",borderBottom:"1px solid #1e3a5f"}}></td></tr>:<tr key={i}><td style={{padding:"6px 0",color:"#8899aa"}}>{r[0]}</td><td style={{padding:"6px 0",textAlign:"right",fontWeight:"600",color:"#e8ecf1"}}>{r[1]}</td><td style={{padding:"6px 0",textAlign:"right",color:"#4a6a8a",fontSize:"11px",width:"60px"}}>{r[2]}</td></tr>)}
          <tr style={{borderTop:"2px solid #3b82f6"}}><td style={{padding:"10px 0",fontWeight:"700",color:"#3b82f6",fontSize:"14px"}}>TOTALE</td><td style={{padding:"10px 0",textAlign:"right",fontWeight:"700",color:"#3b82f6",fontSize:"18px"}}>{fE(st.fT)}</td><td></td></tr>
        </tbody></table></div>
      <div style={bx}><div style={{fontSize:"13px",fontWeight:"700",color:"#e8ecf1",marginBottom:"12px",textTransform:"uppercase"}}>Proporzionalità</div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px"}}><tbody>
          {[["Compenso / Credito",pct(st.fT,st.cC)],["A / (A+B)",pct(feeA,feeA+st.fB)],["Compenso / Esposizione evitata",pct(st.fT,st.cC*2)],["Esposizione evitata",fE(st.cC*2)]].map(([l,v],i)=><tr key={i}><td style={{padding:"5px 0",color:"#6b8299"}}>{l}</td><td style={{padding:"5px 0",textAlign:"right",fontWeight:"600",color:"#f59e0b"}}>{v}</td></tr>)}
        </tbody></table></div></div>
  </div>
  <div style={{...bx,marginTop:"16px"}}><div style={{fontSize:"13px",fontWeight:"700",color:"#e8ecf1",marginBottom:"12px",textTransform:"uppercase"}}>Composizione</div><HBarSVG data={cFee}/></div>
</div>}

{tab==="rischio"&&<div>
  <div style={{display:"flex",gap:"12px",flexWrap:"wrap",marginBottom:"20px"}}>{["alto","medio","basso"].map(r=>{const n=P.filter(p=>p.rk===r).length;const cn=P.filter(p=>p.rk===r&&cert[p.id]).length;return<div key={r} style={{...bx,flex:1,minWidth:"200px"}}><div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}><span style={bd(r)}>{r}</span><span style={{fontSize:"11px",color:"#6b8299"}}>{n} progetti</span></div><div style={{fontSize:"22px",fontWeight:"700",color:RC[r]}}>{cn} certificati</div><div style={{fontSize:"11px",color:"#4a6a8a"}}>{n-cn} esclusi</div></div>})}</div>
  <div style={bx}><div style={{fontSize:"13px",fontWeight:"700",color:"#e8ecf1",marginBottom:"16px",textTransform:"uppercase"}}>Red flag</div>
    {[{t:"Composizione spese",l:"alto",d:"Solo personale (A) e consulenze (D). Assenza totale di beni strumentali (B), privative (B-bis), materiali (E)."},
      {t:"Parcellizzazione progetti IT",l:"alto",d:"10 progetti IT nel 2020, 12 nel 2023. Rischio contestazione come attività ordinaria frammentata."},
      {t:"Progetti a basso contenuto innovativo",l:"alto",d:"Progetti nn. 9, 10, 28, 29, 32: ricette vegetariane, piatto serale, backup IT."},
      {t:"Qualificazione inesistenza credito",l:"alto",d:"AdE propende per inesistenza: sanzione 100-200%, 8 anni, art. 10-quater c.2 (18 mesi – 6 anni)."},
      {t:"Assenza asseverazioni",l:"medio",d:"Questionario Promexia: asseverazioni = No. Le perizie giurate potrebbero supplire."},
      {t:"Confine R&S / IT",l:"medio",d:"RS01 2022-2023 potrebbe essere IT. Impatto aliquota 20% vs 10%."},
      {t:"Coerenza pluriennale RS01",l:"medio",d:"Costi: 374K → 733K → 362K. Variazione +96% 2021-2022 da giustificare."},
      {t:"Consulente unico",l:"basso",d:"Value Target Srl ha redatto tutti i fascicoli. Verificare indipendenza e qualifiche."}
    ].map((rf,i)=><div key={i} style={{padding:"12px 0",borderBottom:i<7?"1px solid #0f2040":"none",display:"flex",gap:"12px",alignItems:"flex-start"}}><span style={bd(rf.l)}>{rf.l}</span><div><div style={{fontWeight:"600",color:"#c8d6e5",marginBottom:"4px"}}>{rf.t}</div><div style={{fontSize:"12px",color:"#6b8299",lineHeight:"1.5"}}>{rf.d}</div></div></div>)}</div>
</div>}

    </div></div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
